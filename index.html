<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuel Mussari | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* Base */
* {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;scroll-behavior:smooth;}
body {
  background: linear-gradient(135deg, #1a1a1a, #2e2e2e);
  background-size: 400% 400%;
  animation: backgroundMove 20s ease infinite;
  color: #fff;
  overflow-x: hidden;
  cursor: default;
}

@keyframes backgroundMove {
  0% {background-position:0% 0%;}
  50% {background-position:100% 100%;}
  100% {background-position:0% 0%;}
}

/* Nav */
nav {
  position: fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index:1000;
}
nav a {
  color: #fff;
  text-decoration:none;
  font-size:1rem;
  opacity:0.85;
  transition:0.3s;
}
nav a:hover {
  opacity:1;
  color: #fbc531;
}

/* Hero */
header {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding: 0 20px;
}
header h1 {
  font-size:4rem;
  font-weight:700;
  margin-bottom:15px;
}
header p {
  font-size:1.5rem;
  color:#ccc;
}

/* Sections overlay */
section {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#1a1a1a;
  overflow:auto;
  z-index:2000;
  transition: all 0.6s ease;
  opacity:0;
  padding: 80px 20px;
}
section.active {
  display:block;
  opacity:1;
}
.closeBtn {
  position:fixed;
  top:30px;
  right:40px;
  font-size:2rem;
  cursor:pointer;
  z-index:3000;
  color:#fbc531;
  opacity:0.8;
  transition:0.3s;
}
.closeBtn:hover {opacity:1;}

h2 {
  text-align:center;
  margin-bottom:40px;
  font-size:2.5rem;
  color:#fff;
}

.projectsGrid, .gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:0 50px;
}
.projectsGrid img, .gallery img {
  width:100%;
  border-radius:12px;
  transition:0.4s;
  cursor:pointer;
  filter:brightness(0.95);
}
.projectsGrid img:hover, .gallery img:hover {
  transform:scale(1.05);
  filter:brightness(1.1);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

footer {
  text-align:center;
  padding:40px;
  opacity:0.7;
  color:#ccc;
}
</style>
</head>
<body>

<nav>
  <a id="linkHome">Home</a>
  <a id="linkProjects">Projects</a>
  <a id="linkGallery">Gallery</a>
  <a id="linkContact">Contatti</a>
</nav>

<header id="home">
  <h1>Manuel Mussari</h1>
  <p>Photographer • Designer • VideoMaker</p>
</header>

<section id="projects">
  <div class="closeBtn" id="closeProjects">×</div>
  <h2>Progetti</h2>
  <div class="projectsGrid">
    <a href="project1.html"><img src="images/proj1-thumb.jpg" alt="Progetto 1"></a>
    <a href="project2.html"><img src="images/proj2-thumb.jpg" alt="Progetto 2"></a>
    <a href="project3.html"><img src="images/proj3-thumb.jpg" alt="Progetto 3"></a>
  </div>
</section>

<section id="gallery">
  <div class="closeBtn" id="closeGallery">×</div>
  <h2>Gallery Fotografica</h2>
  <div class="gallery">
    <img src="images/gallery1.jpg" alt="Foto 1">
    <img src="images/gallery2.jpg" alt="Foto 2">
    <img src="images/gallery3.jpg" alt="Foto 3">
    <img src="images/gallery4.jpg" alt="Foto 4">
  </div>
</section>

<section id="contact">
  <div class="closeBtn" id="closeContact">×</div>
  <h2>Contatti</h2>
  <p style="text-align:center;">manuelmussari@gmail.com</p>
  <p style="text-align:center;margin-top:20px;">
    <a href="https://www.instagram.com/tuoaccount" target="_blank" style="color:#e74c3c;text-decoration:none;font-size:1.8rem;">
      📸 Instagram
    </a>
  </p>
</section>

<footer>
  <p>© 2026 Manuel Mussari</p>
</footer>

<script>
const home = document.getElementById('home');
const projects = document.getElementById('projects');
const gallery = document.getElementById('gallery');
const contact = document.getElementById('contact');

document.getElementById('linkHome').addEventListener('click',()=>{projects.classList.remove('active'); gallery.classList.remove('active'); contact.classList.remove('active'); home.scrollIntoView({behavior:'smooth'});});
document.getElementById('linkProjects').addEventListener('click',()=>{projects.classList.add('active');});
document.getElementById('linkGallery').addEventListener('click',()=>{gallery.classList.add('active');});
document.getElementById('linkContact').addEventListener('click',()=>{contact.classList.add('active');});
document.getElementById('closeProjects').addEventListener('click',()=>{projects.classList.remove('active');});
document.getElementById('closeGallery').addEventListener('click',()=>{gallery.classList.remove('active');});
document.getElementById('closeContact').addEventListener('click',()=>{contact.classList.remove('active');});
</script>

</body>
</html>
