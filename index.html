<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuel Mussari | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* Base */
* {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;scroll-behavior:smooth;}
body {background:#0a0a0a;color:white;overflow-x:hidden;cursor:none;}

/* Custom cursor */
.cursor {position:fixed;width:20px;height:20px;border:2px solid #00ffff;border-radius:50%;pointer-events:none;transform:translate(-50%, -50%);transition:0.1s;z-index:3000;}

/* Nav */
nav {position:fixed;top:0;width:100%;display:flex;justify-content:center;gap:40px;padding:20px;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);z-index:1000;}
nav a {color:white;text-decoration:none;font-size:1rem;opacity:0.8;transition:0.3s;}
nav a:hover {opacity:1;color:#00ffff;}

/* Hero */
header {height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(120deg,#0a0a0a,#111);animation:heroFade 2s ease forwards;}
header h1 {font-size:4rem;color:#00ffff;animation:fadeIn 1.5s ease forwards;}
header p {margin-top:15px;opacity:0;animation:fadeIn 2s forwards 0.5s;color:#ccc;}

/* Sections overlay */
section {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;overflow:auto;z-index:2000;transition:all 0.8s ease;opacity:0;}
section.active {display:block;opacity:1;}
.closeBtn {position:fixed;top:30px;right:40px;font-size:2rem;cursor:pointer;z-index:3000;color:#00ffff;opacity:0.7;transition:0.3s;}
.closeBtn:hover {opacity:1;}

/* Titles */
h2 {text-align:center;margin-bottom:40px;font-size:2.5rem;color:#00ffff;}

/* Grid */
.gallery, .projects {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:0 50px;}
.gallery img, .projects img {width:100%;border-radius:15px;transition:0.5s;cursor:pointer;filter:brightness(0.9);}
.gallery img:hover, .projects img:hover {transform:scale(1.1);filter:brightness(1.2);box-shadow:0 0 20px #00ffff;}

/* Footer */
footer {text-align:center;padding:40px;opacity:0.6;position:relative;color:#ccc;}

/* Animations */
@keyframes fadeIn {from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);}}
@keyframes heroFade {from {opacity:0;} to {opacity:1;}}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
<a id="linkHome">Home</a>
<a id="linkProjects">Projects</a>
<a id="linkGallery">Gallery</a>
<a id="linkContact">Contatti</a>
</nav>

<header id="home">
<h1>Manuel Mussari</h1>
<p>Photographer • Designer • VideoMaker</p>
</header>

<section id="projects">
<div class="closeBtn" id="closeProjects">×</div>
<h2>Progetti</h2>
<div class="projects">
<img src="https://picsum.photos/600/400?1" alt="Progetto 1">
<img src="https://picsum.photos/600/400?2" alt="Progetto 2">
<img src="https://picsum.photos/600/400?3" alt="Progetto 3">
</div>
</section>

<section id="gallery">
<div class="closeBtn" id="closeGallery">×</div>
<h2>Gallery Fotografica</h2>
<div class="gallery">
<img src="https://picsum.photos/500/700?1" alt="Foto 1">
<img src="https://picsum.photos/500/700?2" alt="Foto 2">
<img src="https://picsum.photos/500/700?3" alt="Foto 3">
<img src="https://picsum.photos/500/700?4" alt="Foto 4">
</div>
</section>

<section id="contact">
<div class="closeBtn" id="closeContact">×</div>
<h2>Contatti</h2>
<p style="text-align:center;">manuelmussari@gmail.com</p>
</section>

<footer>
<p>© 2026 Manuel Mussari</p>
</footer>

<script>
// Overlay Sections
const home = document.getElementById('home');
const projects = document.getElementById('projects');
const gallery = document.getElementById('gallery');
const contact = document.getElementById('contact');

document.getElementById('linkHome').addEventListener('click',()=>{
projects.classList.remove('active'); gallery.classList.remove('active'); contact.classList.remove('active');
home.scrollIntoView({behavior:'smooth'});
});

document.getElementById('linkProjects').addEventListener('click',()=>{projects.classList.add('active');});
document.getElementById('linkGallery').addEventListener('click',()=>{gallery.classList.add('active');});
document.getElementById('linkContact').addEventListener('click',()=>{contact.classList.add('active');});

document.getElementById('closeProjects').addEventListener('click',()=>{projects.classList.remove('active');});
document.getElementById('closeGallery').addEventListener('click',()=>{gallery.classList.remove('active');});
document.getElementById('closeContact').addEventListener('click',()=>{contact.classList.remove('active');});

// Custom Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
cursor.style.left = e.clientX + 'px';
cursor.style.top = e.clientY + 'px';
});
</script>

</body>
</html>
